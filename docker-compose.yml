

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewai-backend-2
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Route traffic out of the Docker container to the Windows host's native Ollama instance
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_data_2:/app/data

volumes:
  backend_data_2:
